name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d 11th-Admission-/ ]; then
              git clone https://github.com/${{ github.repository }}.git 11th-Admission-/
            fi
            cd 11th-Admission-/
            git fetch origin main
            git reset --hard origin/main
            docker build -t fyjc-guide:latest .
            docker stop fyjc-guide || true
            docker rm fyjc-guide || true
            docker run -d --name fyjc-guide -p 3000:80 fyjc-guide:latest
